<body>

    <!-- Tombol yang memicu JavaScript -->
    <button class="button-sound" onclick="playSound()">MADU</button>

    <!-- Elemen Audio Tersembunyi -->
    <audio id="clickSound" src="klik.mp3" preload="auto"></audio>

    <script>
        function playSound() {
            var sound = document.getElementById("clickSound");
            sound.currentTime = 0; // Mengulang suara jika diklik cepat
            sound.play();
        }
    </script>
